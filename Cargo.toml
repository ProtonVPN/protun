[package]
name = "protun"
version = "0.1.0"
edition = "2024"

[profile.release]
lto = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
local-agent-rs = { path = "local-agent-rs/local_agent_rs", optional = true }
uniffi = { version = "0.29.2", features = ["cli"], optional = true }

[build-dependencies]
uniffi = { version = "0.29.2", features = ["build"], optional = true }

[features]
android = []
apple = []
linux = []
windows = []
uniffi = ["dep:uniffi"]
local-agent = ["dep:local-agent-rs"]
local-agent-uniffi = ["local-agent", "uniffi", "local-agent-rs/uniffi"]